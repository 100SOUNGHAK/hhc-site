<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HHC — 링크 이동 중...</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f4f6fb;color:#0f172a;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#4F6EF7;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:14px;color:#6b7280}
a{color:#4F6EF7;font-size:13px}
</style>
</head>
<body>
<div class="spinner"></div>
<p>잠시 후 이동합니다...</p>
<p id="err" style="display:none;color:#ef4444">링크를 찾을 수 없습니다.</p>
<a id="direct" style="display:none" href="#">직접 이동하기</a>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var FB_CFG={
  apiKey:"AIzaSyAxAaB-CtySH2_ZHJKidwjbhn8ava6rM00",
  authDomain:"happywork-packageplan.firebaseapp.com",
  projectId:"happywork-packageplan",
  storageBucket:"happywork-packageplan.firebasestorage.app",
  messagingSenderId:"101289103022",
  appId:"1:101289103022:web:d81aca7f3747dd26df673f"
};

(async function(){
  var params=new URLSearchParams(window.location.search);
  var key=params.get('k');
  if(!key){
    document.getElementById('err').style.display='block';
    document.querySelector('p').style.display='none';
    return;
  }
  try{
    var app;
    try{app=firebase.app();}catch(e){app=firebase.initializeApp(FB_CFG);}
    var db=firebase.firestore(app);
    var snap=await db.collection('shorts').where('key','==',key).limit(1).get();
    if(snap.empty){
      document.getElementById('err').style.display='block';
      document.querySelector('p').style.display='none';
      return;
    }
    var url=snap.docs[0].data().url;
    var a=document.getElementById('direct');
    a.href=url;a.style.display='block';
    window.location.href=url;
  }catch(e){
    document.getElementById('err').style.display='block';
    document.querySelector('.spinner').style.display='none';
  }
})();
</script>
</body>
</html>
