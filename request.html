<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0D9488;--teal-dk:#0F766E;--teal-lt:#E6FAF8;
  --navy:#0F1C3F;--indigo:#3D52A0;
  --white:#fff;--surface:#F8FFFE;--surface2:#F0FDFA;
  --border:#CCFBF1;--border-dark:#99F6E4;
  --text:#0F1C3F;--text2:#374151;--text3:#6B7280;
  --green:#16A34A;--green-bg:#DCFCE7;
  --red:#DC2626;--red-bg:#FEE2E2;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;--radius-xl:24px;
  --shadow:0 2px 8px rgba(13,148,136,.08),0 1px 3px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(13,148,136,.15);
}
body{font-family:'Inter',sans-serif;background:linear-gradient(160deg,#F0FDFA 0%,#E6FAF8 50%,#CCFBF1 100%);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}

/* HEADER */
.header{background:var(--teal-dk);padding:14px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(13,148,136,.2)}
.logo-badge{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#fff}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff}
.logo-sub{font-size:9px;color:rgba(255,255,255,.6)}

/* PAGE */
.page-wrap{max-width:540px;margin:0 auto;padding:20px 16px 60px}

/* HERO */
.hero{background:linear-gradient(135deg,var(--teal-dk),var(--teal));border-radius:var(--radius-xl);padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-label{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.hero-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.hero-sub{font-size:12px;color:rgba(255,255,255,.65);line-height:1.6}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.card-head{padding:14px 18px;border-bottom:1px solid var(--surface2);display:flex;align-items:center;gap:9px;background:var(--surface)}
.card-icon{width:28px;height:28px;border-radius:8px;background:var(--teal-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon svg{width:14px;height:14px;stroke:var(--teal);fill:none;stroke-width:1.8}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.card-body{padding:16px 18px}

/* LANG TOGGLE */
.lang-bar{display:flex;gap:6px;margin-bottom:14px}
.lang-btn{flex:1;padding:9px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border-dark);background:var(--white);color:var(--text3)}
.lang-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}

/* FIELD */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.req{color:var(--red);font-size:12px}
.field-input{width:100%;padding:10px 13px;background:var(--surface2);border:1.5px solid var(--border-dark);border-radius:var(--radius-sm);color:var(--text);outline:none;transition:border-color .15s;font-size:14px}
.field-input:focus{border-color:var(--teal);background:var(--white);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.field-input::placeholder{color:var(--text3)}
textarea.field-input{resize:vertical;min-height:80px}

/* ITEMS */
.item-row{background:var(--surface2);border:1.5px solid var(--border-dark);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;position:relative}
.item-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.item-row-bottom{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.item-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.btn-del-item{background:var(--red-bg);color:var(--red);border:none;border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;align-self:flex-end}
.btn-del-item:hover{background:var(--red);color:#fff}
.btn-add-item{width:100%;padding:11px;background:var(--teal-lt);border:1.5px dashed rgba(13,148,136,.4);border-radius:var(--radius-sm);color:var(--teal);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-add-item:hover{background:rgba(13,148,136,.1);border-color:var(--teal)}

/* SUBMIT */
.btn-submit{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:all .18s;margin-top:4px;letter-spacing:.01em}
.btn-submit:hover{background:var(--teal-dk);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* COMPLETE */
.complete-card{background:linear-gradient(135deg,var(--teal-dk),var(--teal));border-radius:var(--radius-xl);padding:24px;text-align:center;margin-bottom:16px;display:none}
.complete-icon{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px}
.complete-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.complete-sub{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6}

/* SHARE BOX */
.share-box{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:16px 18px;margin-bottom:12px;display:none}
.share-title{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.share-msg{font-size:12px;color:var(--text2);line-height:1.7;background:var(--surface);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border);white-space:pre-wrap;word-break:break-word;margin-bottom:10px;max-height:200px;overflow-y:auto}
.share-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-share{flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;min-width:100px}
.btn-wa{background:#25D366;color:#fff}.btn-wa:hover{background:#1ebd5c}
.btn-kakao{background:#FEE500;color:#3A1D1D}.btn-kakao:hover{background:#f0d800}
.btn-copy-msg{background:var(--navy);color:#fff}.btn-copy-msg:hover{background:var(--indigo)}
.copy-ok{display:none;text-align:center;padding:8px;background:var(--green-bg);color:var(--green);border-radius:var(--radius-sm);font-size:12px;font-weight:600;margin-top:8px}

/* ERROR */
.err-msg{color:var(--red);font-size:11px;margin-top:3px;display:none}
.field-input.error{border-color:var(--red)}

/* SPINNER */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

  document.getElementById('f-remarks').placeholder=l.remarksPh;
  document.getElementById('submit-text').textContent=l.submitText;
  renderItems();
}

// URL lang 파라미터 자동 적용
if(currentLang!=='ko'){
  setTimeout(function(){
    const btn=document.querySelector('.lang-btn[data-lang="'+currentLang+'"]');
    if(btn)btn.click();
  },50);
}

document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentLang=btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===currentLang));
    applyLang();
  });
});

// ── 품목 행 ──
function getCats(){return CATS[currentLang];}

function renderItems(){
  const el=document.getElementById('items-list');
  const l=L[currentLang];
  const cats=getCats();
  const catKeys=Object.keys(cats);

  if(!itemRows.length){
    el.innerHTML=`<div style="text-align:center;padding:12px;font-size:12px;color:var(--text3)">${currentLang==='ko'?'품목을 추가해주세요':'Please add items'}</div>`;
    return;
  }

  el.innerHTML=itemRows.map((r,i)=>{
    const svcs=cats[r.cat]||[];
    const catOpts=catKeys.map(k=>`<option value="${k}" ${k===r.cat?'selected':''}>${k}</option>`).join('');
    const svcOpts=svcs.map(s=>`<option value="${s}" ${s===r.svc?'selected':''}>${s}</option>`).join('');
    const needSvc=svcs.length>0;

    return `<div style="background:var(--white);border:1.5px solid var(--border-dark);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px">
      <div class="item-row-grid">
        <div>
          <div class="item-label">${l.catLabel} *</div>
          <select class="field-input item-cat" data-idx="${i}" style="font-size:13px">
            <option value="">${l.catPh}</option>
            ${catOpts}
          </select>
          <div class="err-msg item-err-cat" id="err-cat-${i}">${l.errCat}</div>
        </div>
        <div>
          <div class="item-label">${l.svcLabel}${needSvc?' *':''}</div>
          <select class="field-input item-svc" data-idx="${i}" style="font-size:13px" ${!needSvc?'disabled':''}>
            <option value="">${needSvc?l.svcPh:(currentLang==='ko'?'해당없음':'N/A')}</option>
            ${svcOpts}
          </select>
          <div class="err-msg item-err-svc" id="err-svc-${i}">${l.errSvc}</div>
        </div>
      </div>
      <div class="item-row-bottom">
        <div>
          <div class="item-label">${l.qtyLabel} *</div>
          <input type="text" class="field-input item-qty" data-idx="${i}" value="${r.qty||''}" placeholder="${l.qtyPh}" style="font-size:13px">
          <div class="err-msg item-err-qty" id="err-qty-${i}">${l.errQty}</div>
        </div>
        <button type="button" class="btn-del-item item-del" data-idx="${i}">${l.delLabel}</button>
      </div>
    </div>`;
  }).join('');

  bindItemEvents();
}

function bindItemEvents(){
  document.querySelectorAll('.item-cat').forEach(sel=>{
    sel.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      itemRows[i].cat=e.target.value;
      itemRows[i].svc='';
      renderItems();
    });
  });
  document.querySelectorAll('.item-svc').forEach(sel=>{
    sel.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      itemRows[i].svc=e.target.value;
    });
  });
  document.querySelectorAll('.item-qty').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const i=parseInt(e.target.dataset.idx);
      itemRows[i].qty=e.target.value;
    });
  });
  document.querySelectorAll('.item-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const i=parseInt(e.target.dataset.idx);
      itemRows.splice(i,1);
      renderItems();
    });
  });
}

document.getElementById('btn-add-item').addEventListener('click',()=>{
  itemRows.push({cat:'',svc:'',qty:''});
  renderItems();
  document.getElementById('err-items').style.display='none';
});

// ── VALIDATION ──
function validate(){
  const l=L[currentLang];
  let valid=true;

  // 콘도명
  const condo=document.getElementById('f-condo').value.trim();
  const errCondo=document.getElementById('err-condo');
  if(!condo){
    document.getElementById('f-condo').classList.add('error');
    errCondo.textContent=l.errReq;
    errCondo.style.display='block';
    valid=false;
  }else{
    document.getElementById('f-condo').classList.remove('error');
    errCondo.style.display='none';
  }

  // 전화번호
  const phone=document.getElementById('f-phone').value.trim();
  const errPhone=document.getElementById('err-phone');
  if(!phone){
    document.getElementById('f-phone').classList.add('error');
    errPhone.textContent=l.errReq;
    errPhone.style.display='block';
    valid=false;
  }else{
    document.getElementById('f-phone').classList.remove('error');
    errPhone.style.display='none';
  }

  // 품목
  if(!itemRows.length){
    document.getElementById('err-items').style.display='block';
    valid=false;
  }else{
    document.getElementById('err-items').style.display='none';
  }

  const cats=getCats();
  itemRows.forEach((r,i)=>{
    const svcs=cats[r.cat]||[];
    // 카테고리
    const errCat=document.getElementById(`err-cat-${i}`);
    const catSel=document.querySelector(`.item-cat[data-idx="${i}"]`);
    if(!r.cat){catSel?.classList.add('error');if(errCat)errCat.style.display='block';valid=false;}
    else{catSel?.classList.remove('error');if(errCat)errCat.style.display='none';}
    // 서비스 종류
    const errSvc=document.getElementById(`err-svc-${i}`);
    const svcSel=document.querySelector(`.item-svc[data-idx="${i}"]`);
    if(svcs.length>0&&!r.svc){svcSel?.classList.add('error');if(errSvc)errSvc.style.display='block';valid=false;}
    else{svcSel?.classList.remove('error');if(errSvc)errSvc.style.display='none';}
    // 수량
    const errQty=document.getElementById(`err-qty-${i}`);
    const qtyInp=document.querySelector(`.item-qty[data-idx="${i}"]`);
    if(!r.qty){qtyInp?.classList.add('error');if(errQty)errQty.style.display='block';valid=false;}
    else{qtyInp?.classList.remove('error');if(errQty)errQty.style.display='none';}
  });

  return valid;
}

// ── BUILD MESSAGE ──
function buildMsg(condo,phone,items,remarks){
  const l=L[currentLang];
  const itemLines=items.map(r=>{
    const svc=r.svc?` - ${r.svc}`:'';
    return `  • ${r.cat}${svc} × ${r.qty}`;
  }).join('\n');
  const now=new Date().toLocaleString(currentLang==='ko'?'ko-KR':'en-MY');
  let msg=`${l.msgHeader}`;
  msg+=`${l.msgCondo}${condo}\n`;
  msg+=`${l.msgPhone}${phone}\n\n`;
  msg+=`${l.msgItems}${itemLines}`;
  if(remarks)msg+=`\n\n${l.msgRemarks}${remarks}`;
  msg+=`\n\n⏰ ${now}`;
  msg+=l.msgFooter;
  return msg;
}

// ── SUBMIT ──
document.getElementById('btn-submit').addEventListener('click',async()=>{
  if(!validate())return;
  const l=L[currentLang];
  const condo=document.getElementById('f-condo').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const remarks=document.getElementById('f-remarks').value.trim();
  const cats=getCats();

  const btn=document.getElementById('btn-submit');
  const submitText=document.getElementById('submit-text');
  btn.disabled=true;
  submitText.innerHTML=`<span class="spinner"></span>`;

  // 품목 텍스트
  const itemLines=itemRows.map(r=>{
    const svc=r.svc?` - ${r.svc}`:'';
    return `${r.cat}${svc} × ${r.qty}`;
  }).join('\n');

  // Firebase 저장
  try{
    if(window._hhcSaveRequest){
      await window._hhcSaveRequest({
        condo,phone,remarks,
        lang:currentLang,
        items:JSON.stringify(itemRows),
        status:'pending',
        submitted_at:new Date().toISOString(),
      });
    }
  }catch(e){console.warn('Firebase save failed:',e);}

  // EmailJS 발송
  try{
    await emailjs.send('service_wf4f4eg','template_mu63ahr',{
      customer_name:condo,
      customer_phone:phone,
      customer_address:'',
      booking_date:`[서비스 의뢰 요청 / Service Request]`,
      booking_time:'',
      booking_items:itemLines,
      booking_memo:remarks||'—',
      submitted_at:new Date().toLocaleString('ko-KR'),
    },'O99J6X4SGYUPMfGQy');
  }catch(e){
    console.warn('Email send failed:',e);
  }

  // 완료 화면
  document.getElementById('form-section').style.display='none';
  const completeCard=document.getElementById('complete-card');
  const shareBox=document.getElementById('share-box');
  completeCard.style.display='block';
  shareBox.style.display='block';

  document.getElementById('complete-title').textContent=l.completeTitle;
  document.getElementById('complete-sub').textContent=l.completeSub;
  document.getElementById('share-title').textContent=l.shareTitle;
  document.getElementById('btn-kakao').textContent=l.kakaoBtn;
  document.getElementById('btn-copy').textContent=l.copyBtn;
  document.getElementById('copy-ok').textContent=l.copyOk;

  const msg=buildMsg(condo,phone,itemRows,remarks);
  document.getElementById('share-msg').textContent=msg;

  document.getElementById('btn-wa').onclick=()=>window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
  document.getElementById('btn-kakao').onclick=()=>{
    navigator.clipboard.writeText(msg).then(()=>{
      const ok=document.getElementById('copy-ok');
      ok.style.display='block';
      setTimeout(()=>ok.style.display='none',3000);
    }).catch(()=>prompt('복사 후 붙여넣기:',msg));
  };
  document.getElementById('btn-copy').onclick=()=>{
    navigator.clipboard.writeText(msg).then(()=>{
      const ok=document.getElementById('copy-ok');
      ok.style.display='block';
      setTimeout(()=>ok.style.display='none',3000);
    });
  };

  window.scrollTo({top:0,behavior:'smooth'});
});

// ── INIT ──
addFirstItem();
function addFirstItem(){
  itemRows.push({cat:'',svc:'',qty:''});
  renderItems();
}
</script>
