<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — Happy Home Care</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6fb;color:#0f172a;min-height:100vh}
.topbar{background:#0F1729;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:8px;color:#fff;font-size:15px;font-weight:600}
.brand-dot{width:7px;height:7px;border-radius:50%;background:#E8A838}
.print-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.print-btn:hover{background:rgba(255,255,255,.25)}
.container{max-width:720px;margin:24px auto;padding:0 16px 40px}
.inv-card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:32px;margin-bottom:16px}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid #0F1729}
.inv-logo{font-size:20px;font-weight:700;color:#0F1729;line-height:1.2}
.inv-logo span{color:#4F6EF7}
.inv-logo-sub{font-size:11px;color:#6b7280;margin-top:4px}
.inv-meta{text-align:right;font-size:12px;color:#6b7280;line-height:1.8}
.inv-meta strong{color:#0f172a;font-size:18px;display:block;margin-bottom:4px;letter-spacing:.5px}
.inv-meta .inv-id{font-family:monospace;color:#4F6EF7;font-size:14px;font-weight:700;display:block;margin-bottom:6px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;margin-top:4px;white-space:nowrap}
.badge-paid{background:#d1fae5;color:#065f46}
.badge-billing{background:#fef3c7;color:#d97706}
.badge-overdue{background:#fee2e2;color:#991b1b}
.parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.party-lbl{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.party-name{font-weight:600;font-size:15px;color:#0f172a}
.party-info{font-size:12px;color:#6b7280;line-height:1.7;margin-top:3px}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.inv-table thead tr{background:#0F1729}
.inv-table th{color:#fff;padding:10px 12px;font-size:11px;font-weight:600;text-align:left;letter-spacing:.3px}
.inv-table th:nth-child(2){text-align:center}
.inv-table th:nth-child(3),.inv-table th:nth-child(4){text-align:right}
.inv-table td{padding:11px 12px;font-size:13px;border-bottom:1px solid #f1f5f9}
.inv-table td:nth-child(2){text-align:center;color:#6b7280}
.inv-table td:nth-child(3){text-align:right;color:#6b7280}
.inv-table td:nth-child(4){text-align:right;font-weight:600;color:#0f172a}
.inv-table tbody tr:last-child td{border-bottom:none}
.totals-wrap{display:flex;justify-content:flex-end;margin-bottom:20px}
.totals{min-width:220px}
.total-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:#6b7280}
.total-row.deduct{color:#ef4444}
.total-row.add{color:#0f172a}
.total-grand{display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:#0F1729;border-top:2px solid #0F1729;padding-top:10px;margin-top:6px}
.bank-box{background:#f0f7ff;border:1px solid #bfdbfe;border-radius:10px;padding:16px;margin-bottom:16px}
.bank-box-title{font-size:11px;font-weight:700;color:#1d4ed8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.bank-name{font-size:14px;font-weight:600;color:#0f172a;margin-bottom:4px}
.bank-detail{font-size:12px;color:#374151;line-height:1.8}
.footer-note{background:#f8faff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;font-size:12px;color:#6b7280;line-height:1.7}
.footer-note b{color:#0f172a}
.stamp-wrap{text-align:center;margin-bottom:16px}
.stamp{display:inline-block;font-size:18px;font-weight:800;padding:6px 16px;border-radius:4px;opacity:.65;transform:rotate(-12deg)}
.stamp-paid{border:3px solid #065f46;color:#065f46}
.stamp-bill{border:3px solid #d97706;color:#d97706}
.loading-state{text-align:center;padding:80px 20px;color:#6b7280}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#4F6EF7;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{text-align:center;padding:80px 20px}
.error-icon{font-size:48px;margin-bottom:12px}
.error-title{font-size:18px;font-weight:600;color:#0f172a;margin-bottom:6px}
.error-sub{font-size:14px;color:#6b7280}
@media(max-width:600px){
  .inv-card{padding:20px;border-radius:12px}
  .parties{grid-template-columns:1fr}
  .inv-header{flex-direction:column;gap:12px}
  .inv-meta{text-align:left}
  .totals{min-width:160px}
}
@media print{
  body{background:#fff}
  #kakao-overlay,#kakao-popup,#kakao-banner{display:none!important}
  .topbar{display:none}
  .container{margin:0;padding:0;max-width:100%}
  .inv-card{box-shadow:none;border-radius:0;padding:24px}
  .inv-meta strong{font-size:22px}
  @page{margin:15mm}
}
.logo-img{height:48px;max-width:120px;object-fit:contain;display:block;flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-text{display:flex;flex-direction:column}
.sign-section{border-top:1px solid #e2e8f0;margin-top:20px;padding-top:16px}
.sign-line{border-top:1.5px solid #0f172a;width:200px;margin:8px 0 6px}
.sign-img{max-height:64px;max-width:180px;object-fit:contain;display:block;margin:8px 0}
.sign-name{font-size:13px;font-weight:700;color:#0f172a}
.sign-title{font-size:12px;color:#6b7280;margin-top:2px}
.sign-company{font-size:11px;color:#9ca3af;margin-top:1px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="brand-dot"></div>Happy Home Care</div>
  <button class="print-btn" onclick="tryPrint()">🖨️ 인쇄 / PDF 저장</button>
</div>
<div class="container">
  <div id="inv-content">
    <div class="loading-state"><div class="spinner"></div><div>Loading invoice...</div></div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
(function(){
var FB_CONFIG={
  apiKey:"AIzaSyAxAaB-CtySH2_ZHJKidwjbhn8ava6rM00",
  authDomain:"happywork-packageplan.firebaseapp.com",
  projectId:"happywork-packageplan",
  storageBucket:"happywork-packageplan.firebasestorage.app",
  messagingSenderId:"101289103022",
  appId:"1:101289103022:web:d81aca7f3747dd26df673f"
};

function fmtDate(d){
  if(!d)return'';
  var p=d.split('-');
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];
}
function fmtAmt(n,cur){
  var c=cur||'MYR',sym=c==='MYR'?'RM ':c==='USD'?'$ ':'₩';
  return sym+Number(n||0).toFixed(c==='KRW'?0:2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}

function showError(msg){
  document.getElementById('inv-content').innerHTML=
    '<div class="error-state"><div class="error-icon">📄</div>'+
    '<div class="error-title">Invoice Not Found</div>'+
    '<div class="error-sub">'+msg+'</div></div>';
}

function calcTotals(inv){
  var items=inv.items||[];
  var sub=items.reduce(function(s,l){return s+(l.price||0)*(l.qty||1);},0);
  var taxRate=parseFloat(inv.taxRate)||0;
  var discVal=parseFloat(inv.discVal)||0;
  var discType=inv.discType||'pct';
  var parkFee=parseFloat(inv.parkingFee)||0;
  var minChg=parseFloat(inv.minCharge)||0;
  var extraFee=parseFloat(inv.extraFee)||0;
  var creditUse=parseFloat(inv.creditUse)||0;
  var tax=taxRate/100*sub;
  var disc=discType==='pct'?discVal/100*sub:discVal;
  var grand=sub+tax-disc+parkFee+extraFee-creditUse;
  if(minChg>0&&grand<minChg)grand=minChg;
  return{sub:sub,tax:tax,taxRate:taxRate,disc:disc,discVal:discVal,discType:discType,
    parkFee:parkFee,minChg:minChg,extraFee:extraFee,creditUse:creditUse,grand:grand};
}

function renderInvoice(inv){
  var cur=inv.currency||'MYR';
  function fa(n){return fmtAmt(n,cur);}
  var t=calcTotals(inv);
  // Status labels in English
  var sl={billing:'Invoice for Billing',paid:'Paid Invoice',overdue:'Overdue'};
  var sc={billing:'badge-billing',paid:'badge-paid',overdue:'badge-overdue'};
  var cust=inv.customer||{};
  var iss=inv.issuer||{
    name:'Happy Works Services Sdn. Bhd.',
    email:'admin@happyhomecare.com.my',
    phone:'+60 12-000 0000',
    addr:'Kuala Lumpur, Malaysia'
  };
  var items=inv.items||[];
  // Customer info lines
  var ci=[cust.addr,cust.phone,cust.email,
    cust.biz?'Reg No: '+cust.biz:''].filter(Boolean).join('<br>');
  // Issuer info lines
  var issInfo=[iss.email,iss.phone,iss.addr,
    iss.biz?'Reg No: '+iss.biz:''].filter(Boolean).join('<br>');
  // Service rows
  var rows=items.length?items.map(function(li){
    return '<tr>'+
      '<td>'+li.name+'</td>'+
      '<td>'+li.qty+'</td>'+
      '<td>'+fa(li.price)+'</td>'+
      '<td>'+fa((li.price||0)*(li.qty||1))+'</td>'+
    '</tr>';
  }).join(''):'<tr><td colspan="4" style="text-align:center;padding:20px;color:#6b7280">No items</td></tr>';

  // Charge adjustment rows
  var chargeRows='';
  if(t.taxRate>0)
    chargeRows+='<div class="total-row add"><span>Tax ('+t.taxRate+'%)</span><span>+'+fa(t.tax)+'</span></div>';
  if(t.discVal>0)
    chargeRows+='<div class="total-row deduct"><span>Discount'+(t.discType==='pct'?' ('+t.discVal+'%)':'')+'</span><span>− '+fa(t.disc)+'</span></div>';
  if(t.parkFee>0)
    chargeRows+='<div class="total-row add"><span>Parking Fee</span><span>+'+fa(t.parkFee)+'</span></div>';
  if(t.extraFee>0)
    chargeRows+='<div class="total-row add"><span>Additional Fee</span><span>+'+fa(t.extraFee)+'</span></div>';
  if(t.creditUse>0)
    chargeRows+='<div class="total-row deduct"><span>Credit Used</span><span>− '+fa(t.creditUse)+'</span></div>';

  // Bank / payment section
  var bankSec='';
  if(inv.bankInfo){
    bankSec='<div class="bank-box">'+
      '<div class="bank-box-title">Payment Details</div>'+
      '<div class="bank-name">'+inv.bankInfo.bankName+'</div>'+
      '<div class="bank-detail">'+
        'Account Name: '+inv.bankInfo.accName+'<br>'+
        'Account No: '+inv.bankInfo.accNum+
      '</div>'+
    '</div>';
  }

  // Notes / terms footer
  var footerSec='';
  if(inv.notes||inv.terms){
    footerSec='<div class="footer-note">'+
      (inv.notes?'<b>Notes:</b> '+inv.notes+'<br>':'')+
      (inv.terms?'<b>Payment Terms:</b> '+inv.terms:'')+
    '</div>';
  }

  // 서명 섹션
  var signSec='';
  var imgs=inv._images||{};
  if(imgs.sign||imgs.signerName||imgs.signerTitle){
    signSec='<div class="sign-section">'+
      '<div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Authorized Signature</div>'+
      (imgs.sign?'<img src="'+imgs.sign+'" class="sign-img" alt="signature">':
        '<div class="sign-line"></div>')+
      (imgs.signerName?'<div class="sign-name">'+imgs.signerName+'</div>':'')+
      (imgs.signerTitle?'<div class="sign-title">'+imgs.signerTitle+'</div>':'')+
      '<div class="sign-company">Happy Works Services Sdn. Bhd.</div>'+
    '</div>';
  }

  document.getElementById('inv-content').innerHTML=
    '<div class="inv-card">'+
      (inv.status==='paid'?'<div class="stamp-wrap"><span class="stamp stamp-paid">PAID ✓</span></div>':
       inv.status==='billing'?'<div class="stamp-wrap"><span class="stamp stamp-bill">BILL 📋</span></div>':'')+
      '<div class="inv-header">'+
        '<div class="logo-wrap">'+
          (inv._images&&inv._images.logo?'<img src="'+inv._images.logo+'" class="logo-img" alt="logo">':'')+ 
          '<div class="logo-text">'+
          '<div class="inv-logo">Happy<span>Home</span>Care</div>'+
          '<div class="inv-logo-sub">'+iss.name+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="inv-meta">'+
          '<strong>INVOICE</strong>'+
          '<span class="inv-id">NO. '+(inv.id||'—')+'</span>'+
          '<span style="display:block;font-size:12px;color:#6b7280">Issue Date: '+fmtDate(inv.date)+'</span>'+
          '<span style="display:block;font-size:12px;color:#6b7280;margin-bottom:4px">Due Date: '+fmtDate(inv.due)+'</span>'+
          '<span class="badge '+(sc[inv.status]||'badge-billing')+'">'+(sl[inv.status]||'Invoice')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="parties">'+
        '<div>'+
          '<div class="party-lbl">Bill To</div>'+
          '<div class="party-name">'+(cust.name||'—')+'</div>'+
          '<div class="party-info">'+ci+'</div>'+
        '</div>'+
        '<div>'+
          '<div class="party-lbl">From</div>'+
          '<div class="party-name">'+iss.name+'</div>'+
          '<div class="party-info">'+issInfo+'</div>'+
        '</div>'+
      '</div>'+
      '<table class="inv-table">'+
        '<thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Amount</th></tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table>'+
      '<div class="totals-wrap"><div class="totals">'+
        '<div class="total-row"><span>Subtotal</span><span>'+fa(t.sub)+'</span></div>'+
        chargeRows+
        '<div class="total-grand"><span>Total ('+cur+')</span><span>'+fa(t.grand)+'</span></div>'+
      '</div></div>'+
      bankSec+
      footerSec+
      signSec+
    '</div>';

  document.title='Invoice '+(inv.id||'')+' — Happy Home Care';
}

async function loadInvoice(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){showError('No invoice ID provided.');return;}
  try{
    firebase.initializeApp(FB_CONFIG);
    var db=firebase.firestore();
    // 인보이스, 발행처 정보, 이미지 설정을 동시에 불러오기
    var results=await Promise.all([
      db.collection('invoices').where('id','==',id).limit(1).get(),
      db.collection('settings').doc('issuer').get(),
      db.collection('settings').doc('images').get()
    ]);
    var snap=results[0];
    var issuerDoc=results[1];
    var imagesDoc=results[2];
    if(snap.empty){showError('Invoice '+id+' not found.');return;}
    var invData=snap.docs[0].data();
    // 최신 발행처 정보 우선 적용
    if(issuerDoc.exists){
      invData.issuer=Object.assign({},invData.issuer||{},issuerDoc.data());
    }
    // 이미지 설정 적용
    invData._images=imagesDoc.exists?imagesDoc.data():{};
    renderInvoice(invData);
  }catch(e){showError('Failed to load: '+e.message);}
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',loadInvoice);
}else{loadInvoice();}
})();
</script>

  ⚠️ 카카오톡에서는 인쇄/PDF 저장 불가 &nbsp;|&nbsp; <b>··· → 다른 브라우저로 열기</b>
</div>

<script>
// 카카오톡 인앱 브라우저 감지
function isKakao(){
  var ua = navigator.userAgent||'';
  // 카카오톡 UA에는 'KAKAOTALK' 또는 'KAKAO' 포함
  return /KAKAOTALK/i.test(ua) || /kakaotalk/i.test(ua) ||
         // 일부 구버전 카카오
         (ua.indexOf('kakao') !== -1);
}

function showKakaoGuide(){
  var overlay = document.getElementById('kakao-overlay');
  var popup   = document.getElementById('kakao-popup');
  if(!overlay || !popup) return;
  overlay.style.display = 'block';
  popup.style.display   = 'block';
  // 슬라이드 업 애니메이션
  setTimeout(function(){ popup.style.transform = 'translateY(0)'; }, 20);
}

function closeKakaoGuide(){
  var overlay = document.getElementById('kakao-overlay');
  var popup   = document.getElementById('kakao-popup');
  if(!overlay || !popup) return;
  popup.style.transform = 'translateY(100%)';
  setTimeout(function(){
    overlay.style.display = 'none';
    popup.style.display   = 'none';
  }, 350);
}

// 인쇄 버튼 동작
function tryPrint(){
  if(isKakao()){
    showKakaoGuide();
  } else {
    window.print();
  }
}

// 페이지 로드 시 실행
window.addEventListener('DOMContentLoaded', function(){
  // 닫기 버튼 이벤트
  var closeBtn = document.getElementById('kakao-close-btn');
  if(closeBtn) closeBtn.addEventListener('click', closeKakaoGuide);
  var overlay = document.getElementById('kakao-overlay');
  if(overlay) overlay.addEventListener('click', closeKakaoGuide);

  // 카카오톡이면 배너 + 팝업 자동 표시
  if(isKakao()){
    var banner = document.getElementById('kakao-banner');
    if(banner) banner.style.display = 'block';
    // 0.6초 후 팝업
    setTimeout(showKakaoGuide, 600);
  }
});
</script>
